spring:
    application:
        name: teaHomeMenu-service
    # 数据源配置
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://39.105.19.237:3306/teaHomeMenu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: ENC[AES256_GCM,data:LOl8BbbT,iv:s+742bFpkQIKBwWe4dPgTELW5WKxwkKGe6fHdPuG1iE=,tag:5/ru7g8cz+SCHKQ2CnA8uQ==,type:int]
        # HikariCP连接池配置
        hikari:
            minimum-idle: 5
            maximum-pool-size: 20
            auto-commit: true
            idle-timeout: 30000
            pool-name: TeaMenuHikariCP
            max-lifetime: 1800000
            connection-timeout: 30000
            connection-test-query: SELECT 1
    # Jackson配置
    jackson:
        time-zone: GMT+8
        date-format: yyyy-MM-dd HH:mm:ss
        serialization:
            write-dates-as-timestamps: false
        default-property-inclusion: non_null
# MyBatis Plus配置
mybatis-plus:
    # Mapper XML文件位置
    mapper-locations: classpath:mapper/*.xml
    # 实体类包路径
    type-aliases-package: com.hellogroup.teamenu.infrastructure.persistence.entity
    # 全局配置
    global-config:
        # 数据库配置
        db-config:
            # 主键类型（自增）
            id-type: auto
            # 逻辑删除字段
            logic-delete-field: deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
        # 关闭Banner
        banner: false
    # 配置
    configuration:
        # 驼峰转下划线
        map-underscore-to-camel-case: true
        # 日志
        log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
        # 缓存
        cache-enabled: false
